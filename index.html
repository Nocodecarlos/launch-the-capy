<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Launch the Capy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0B1320;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
      padding: 60px 24px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 12px;
    }

    .emoji { font-size: 3.5rem; margin-bottom: 16px; }

    p {
      font-size: 1.15rem;
      color: #a0aec0;
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 36px;
    }

    .badge {
      display: inline-block;
      background: #ffffff;
      border-radius: 14px;
      padding: 14px 28px;
      text-decoration: none;
      color: #0B1320;
      font-weight: 700;
      font-size: 1rem;
      transition: opacity 0.2s;
    }

    .badge:hover { opacity: 0.85; }

    footer {
      margin-top: 64px;
      font-size: 0.8rem;
      color: #4a5568;
    }
  </style>
</head>
<body>
  <div class="emoji">🌿</div>
  <h1>Launch the Capy</h1>
  <p>
    Slingshot a capybara as high as possible! Bounce off clouds, collect coins,
    grab powerups, and dodge hazards on the way to the moon.
  </p>
  <a class="badge" href="https://apps.apple.com/app/6761528445" target="_blank">
    ⬇ Download on the App Store
  </a>
  <footer>
    &copy; 2026 Carlos Velasquez. All rights reserved.
  </footer>
</body>
</html>
